services:
  app:
    image: mcr.microsoft.com/devcontainers/base:ubuntu-22.04
    volumes:
      - ..:/workspace:cached
    command: sleep infinity
    environment:
      DATABASE_URL: postgresql://hoshika:hoshika@db:5432/hoshika
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: hoshika
      POSTGRES_PASSWORD: hoshika
      POSTGRES_DB: hoshika
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hoshika -d hoshika"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
