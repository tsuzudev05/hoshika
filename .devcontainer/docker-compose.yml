services:
  app:
    image: mcr.microsoft.com/devcontainers/base:ubuntu-22.04
    volumes:
      - ..:/workspace:cached
    command: sleep infinity
    env_file: .env
    depends_on:
      db:
        condition: service_healthy

  db:
    # postgres:16-alpine — メジャーバージョン 16 に固定（マイナーは自動更新）
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hoshika -d hoshika"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
