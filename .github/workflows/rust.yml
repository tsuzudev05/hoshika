name: Rust CI

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "migrations/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/rust.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "migrations/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/rust.yml"

env:
  CARGO_TERM_COLOR: always
  SQLX_VERSION: "0.7.4"

jobs:
  check:
    name: Build / Test / Lint
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: hoshika
          POSTGRES_PASSWORD: hoshika
          POSTGRES_DB: hoshika
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hoshika -d hoshika"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://hoshika:hoshika@localhost:5432/hoshika

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install sqlx-cli
        run: |
          cargo install sqlx-cli \
            --version ${{ env.SQLX_VERSION }} \
            --no-default-features \
            --features native-tls,postgres \
            --locked

      - name: Run migrations
        run: sqlx migrate run

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: cargo build
        run: cargo build --locked

      - name: cargo test
        run: cargo test --locked
