name: Rust CI

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "migrations/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/rust.yml"
      - "scripts/check-layer-deps.sh"
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Build / Test / Lint
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: hoshika
          POSTGRES_PASSWORD: hoshika
          POSTGRES_DB: hoshika
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hoshika -d hoshika"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://hoshika:hoshika@localhost:5432/hoshika

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install sqlx-cli
        run: |
          SQLX_VERSION=$(awk '/^name = "sqlx"$/ { found=1 } found && /^version / { gsub(/"/, "", $3); print $3; exit }' Cargo.lock)
          echo "sqlx-cli version: ${SQLX_VERSION}"
          cargo install sqlx-cli \
            --version "${SQLX_VERSION}" \
            --no-default-features \
            --features rustls,postgres \
            --locked

      - name: Run migrations
        run: sqlx migrate run

      - name: Check layer dependencies
        id: layer-deps
        run: bash scripts/check-layer-deps.sh

      - name: cargo fmt
        id: fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        id: clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: cargo build
        id: build
        run: cargo build --locked

      - name: cargo test
        id: test
        run: cargo test --locked

      - name: Job Summary
        if: always()
        run: |
          echo "## Rust CI Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| layer-deps | ${{ steps.layer-deps.outcome == 'success' && '✅ passed' || steps.layer-deps.outcome == 'skipped' && '⏭ skipped' || '❌ failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| fmt    | ${{ steps.fmt.outcome    == 'success' && '✅ passed' || steps.fmt.outcome    == 'skipped' && '⏭ skipped' || '❌ failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| clippy | ${{ steps.clippy.outcome == 'success' && '✅ passed' || steps.clippy.outcome == 'skipped' && '⏭ skipped' || '❌ failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| build  | ${{ steps.build.outcome  == 'success' && '✅ passed' || steps.build.outcome  == 'skipped' && '⏭ skipped' || '❌ failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| test   | ${{ steps.test.outcome   == 'success' && '✅ passed' || steps.test.outcome   == 'skipped' && '⏭ skipped' || '❌ failed' }} |" >> $GITHUB_STEP_SUMMARY
