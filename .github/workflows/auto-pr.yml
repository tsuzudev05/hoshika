name: Auto PR Creator

on:
  # 手動実行時、画面上部の "Use workflow from" でPRにしたいブランチを選択する
  # （head_branch を明示入力した場合はそちらを優先）。マージ先は常に main。
  workflow_dispatch:
    inputs:
      head_branch:
        description: "PR にするブランチ名（空欄の場合は上の Use workflow from で選択したブランチを使う）"
        required: false
        type: string

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      BASE_BRANCH: main

    steps:
      - name: Checkout main (scripts always from main)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Fetch head branch
        run: git fetch origin ${{ inputs.head_branch || github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install groq

      - name: Resolve branch names
        run: |
          echo "HEAD_BRANCH=${{ inputs.head_branch || github.ref_name }}" >> $GITHUB_ENV

      - name: Generate diff (vs base branch)
        run: |
          git diff origin/${{ env.BASE_BRANCH }}...origin/${{ env.HEAD_BRANCH }} \
            -- . \
            ':(exclude)*.sum' \
            ':(exclude)*.lock' \
            ':(exclude)node_modules/**' \
            > diff.txt
          echo "diff lines: $(wc -l < diff.txt)"

      - name: Get commit log
        run: |
          LOG=$(git log origin/${{ env.BASE_BRANCH }}..origin/${{ env.HEAD_BRANCH }} --oneline)
          echo "COMMIT_LOG<<EOF" >> $GITHUB_ENV
          echo "$LOG"           >> $GITHUB_ENV
          echo "EOF"            >> $GITHUB_ENV

      - name: Create PR with AI-generated description
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GH_PAT:       ${{ secrets.GH_PAT }}
          HEAD_BRANCH:  ${{ env.HEAD_BRANCH }}
          BASE_BRANCH:  ${{ env.BASE_BRANCH }}
          REPO:         ${{ github.repository }}
          COMMIT_LOG:   ${{ env.COMMIT_LOG }}
        run: python scripts/auto_pr.py
