name: Frontend CI

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend.yml"
  pull_request:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend.yml"

env:
  NODE_VERSION: "20"

defaults:
  run:
    working-directory: frontend

jobs:
  check:
    name: Type Check / Lint / Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        id: typecheck
        run: npm run type-check

      - name: Lint
        id: lint
        run: npm run lint

      - name: Build
        id: build
        run: npm run build

      - name: Job Summary
        if: always()
        run: |
          echo "## Frontend CI Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check      | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| type-check | ${{ steps.typecheck.outcome == 'success' && '✅ passed' || steps.typecheck.outcome == 'skipped' && '⏭ skipped' || '❌ failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| lint       | ${{ steps.lint.outcome      == 'success' && '✅ passed' || steps.lint.outcome      == 'skipped' && '⏭ skipped' || '❌ failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| build      | ${{ steps.build.outcome     == 'success' && '✅ passed' || steps.build.outcome     == 'skipped' && '⏭ skipped' || '❌ failed' }} |" >> $GITHUB_STEP_SUMMARY
